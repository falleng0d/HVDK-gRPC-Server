name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore GRPCRemote.Tests/GRPCRemote.Tests.csproj

      - name: Test
        run: dotnet test GRPCRemote.Tests/GRPCRemote.Tests.csproj --filter "FullyQualifiedName!~Integration" --no-restore

  build:
    name: Build
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore GRPCRemoteInstaller/GRPCRemoteInstaller.wixproj

      - name: Set installer version
        run: "Add-Content -Path $env:GITHUB_ENV -Value ('PRODUCT_VERSION=' + $env:GITHUB_REF_NAME.TrimStart('v'))"

      - name: Build
        run: dotnet build GRPCRemoteInstaller/GRPCRemoteInstaller.wixproj -c Release -p:ProductVersion=${{ env.PRODUCT_VERSION }} --no-restore

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: GRPCRemoteInstaller/bin/x64/Release/*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
